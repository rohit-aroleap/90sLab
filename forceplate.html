<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forceplate — 90sLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0e0e0f;
  --bg2:      #161618;
  --bg3:      #1e1e21;
  --bg4:      #26262a;
  --border:   rgba(255,255,255,.08);
  --border2:  rgba(255,255,255,.14);
  --text:     #e8e8ea;
  --text2:    #888890;
  --text3:    #55555c;
  --green:    #4ade80;
  --green-bg: rgba(74,222,128,.1);
  --red:      #f87171;
  --red-bg:   rgba(248,113,113,.1);
  --amber:    #fbbf24;
  --amber-bg: rgba(251,191,36,.1);
  --blue:     #60a5fa;
  --fl:       #60a5fa;
  --fr:       #4ade80;
  --bl:       #fbbf24;
  --br:       #f87171;
  --r:  6px;
  --r2: 10px;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
body { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

.header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.header h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; }
.header-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.spacer { flex: 1; }
.pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500;
        padding: 4px 10px; border-radius: 20px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }

.dashboard-picker { display: inline-flex; gap: 2px; padding: 3px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; }
.dp-opt { font-family: var(--font); font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 6px;
          color: var(--text2); text-decoration: none; transition: background .15s, color .15s; }
.dp-opt:hover { color: var(--text); }
.dp-opt.dp-active { background: var(--bg4); color: var(--text); }

button { font-family: var(--font); font-size: 13px; font-weight: 500; padding: 7px 14px;
         border-radius: var(--r); border: 1px solid var(--border2); background: var(--bg3);
         color: var(--text); cursor: pointer; transition: background .15s, opacity .15s; }
button:hover { background: var(--bg4); }
button:active { opacity: .75; }
button:disabled { opacity: .3; cursor: not-allowed; }
.btn-green { background: var(--green-bg); border-color: rgba(74,222,128,.3); color: var(--green); }
.btn-green:hover { background: rgba(74,222,128,.18); }
.btn-red   { background: var(--red-bg);   border-color: rgba(248,113,113,.3); color: var(--red); }
.btn-red:hover   { background: rgba(248,113,113,.18); }

input[type=text] {
  font-family: var(--mono); font-size: 13px; padding: 7px 10px; border-radius: var(--r);
  border: 1px solid var(--border2); background: var(--bg3); color: var(--text); outline: none; }
input:focus { border-color: var(--blue); }

.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 14px 16px; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

.controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }

.metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 10px; }
@media (max-width: 600px) { .metrics { grid-template-columns: repeat(2, minmax(0,1fr)); } }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 12px 14px; }
.m-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.m-tag { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.m-val  { font-size: 24px; font-weight: 500; font-family: var(--mono); line-height: 1; }
.m-unit { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 3px; }

.total-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
             background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 12px 16px; margin-bottom: 10px; }
.total-main { font-size: 32px; font-weight: 500; font-family: var(--mono); color: var(--text); }
.total-unit { font-size: 13px; color: var(--text3); }

#stabCanvas { display: block; width: 100%; max-width: 600px; margin: 0 auto; border-radius: var(--r);
              background: var(--bg3); border: 1px solid var(--border); aspect-ratio: 1; }

/* Balance Test card */
.test-grid { display: grid; grid-template-columns: 180px 1fr; gap: 16px; align-items: stretch; }
@media (max-width: 600px) { .test-grid { grid-template-columns: 1fr; } }
.test-score-box { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r2);
                  display: flex; flex-direction: column; align-items: center; justify-content: center;
                  padding: 18px 10px; text-align: center; }
.test-score-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.test-score-val { font-family: var(--mono); font-size: 52px; font-weight: 500; line-height: 1; color: var(--text); }
.test-score-val.scored-100 { color: var(--green); }
.test-score-val.scored-80  { color: var(--green); }
.test-score-val.scored-60  { color: var(--amber); }
.test-score-val.scored-40  { color: var(--amber); }
.test-score-val.scored-0   { color: var(--red); }
.test-score-sub { font-size: 11px; color: var(--text3); margin-top: 6px; font-family: var(--mono); }
.test-panel { display: flex; flex-direction: column; gap: 6px; justify-content: space-between; }
.test-stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0;
                 border-bottom: 1px solid var(--border); }
.test-stat-label { font-size: 12px; color: var(--text2); }
.test-stat-val { font-family: var(--mono); font-size: 14px; color: var(--text); font-weight: 500; }
.test-controls { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.test-progress { margin-top: 10px; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.test-progress-fill { height: 100%; width: 0%; background: var(--green); transition: width .15s, background .2s; }

.c-fl { color: var(--fl); } .c-fr { color: var(--fr); }
.c-bl { color: var(--bl); } .c-br { color: var(--br); }
</style>
</head>
<body>

<div class="header">
  <h1>FORCEPLATE</h1>
  <span class="header-sub">RSL301 · HX711 · ESP32</span>
  <div class="spacer"></div>
  <span class="pill" id="hz-pill" style="display:none"><span id="hz-val">–</span> Hz</span>
  <span class="pill" style="margin-left:6px"><span class="dot" id="status-dot"></span><span id="status-text">Disconnected</span></span>
</div>

<div class="dashboard-picker">
  <a href="balance-board.html" class="dp-opt">IMU Board</a>
  <a href="forceplate.html" class="dp-opt dp-active">Force Plate</a>
</div>

<div class="controls">
  <input type="text" id="host-input" value="force-plate.local" style="width:220px" placeholder="host or IP">
  <button class="btn-green" id="btn-connect">Connect</button>
  <button class="btn-red" id="btn-disconnect" disabled>Disconnect</button>
  <button id="btn-tare" disabled>Tare (zero)</button>
</div>

<!-- BALANCE TEST CARD -->
<div class="card" id="test-card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span class="card-title">Balance Test · 30 seconds</span>
    <span id="test-state" style="font-size:11px;color:var(--text3);font-family:var(--mono)">Ready</span>
  </div>
  <div class="test-grid">
    <div class="test-score-box">
      <div class="test-score-label">Score</div>
      <div class="test-score-val" id="test-score">–</div>
      <div class="test-score-sub" id="test-score-sub">out of 100</div>
    </div>
    <div class="test-panel">
      <div class="test-stat-row">
        <span class="test-stat-label">Time remaining</span>
        <span class="test-stat-val" id="test-time">30.0 s</span>
      </div>
      <div class="test-stat-row">
        <span class="test-stat-label">Time held</span>
        <span class="test-stat-val" id="test-held">0.0 s</span>
      </div>
      <div class="test-stat-row">
        <span class="test-stat-label">Mean COP velocity</span>
        <span class="test-stat-val" id="test-vel">– mm/s</span>
      </div>
      <div class="test-controls">
        <button class="btn-green" id="btn-test-start" disabled>▶ Start Test</button>
        <button class="btn-red"   id="btn-test-stop"  disabled>■ Stop (Fell Off)</button>
        <button                    id="btn-test-reset">Reset</button>
      </div>
    </div>
  </div>
  <div class="test-progress"><div class="test-progress-fill" id="test-progress-fill"></div></div>
</div>

<!-- Corner forces -->
<div class="metrics">
  <div class="metric"><div class="m-label"><span class="m-tag" style="background:var(--fl)"></span>Front-Left</div>
    <div class="m-val c-fl" id="v0">–</div><div class="m-unit">g</div></div>
  <div class="metric"><div class="m-label"><span class="m-tag" style="background:var(--fr)"></span>Front-Right</div>
    <div class="m-val c-fr" id="v1">–</div><div class="m-unit">g</div></div>
  <div class="metric"><div class="m-label"><span class="m-tag" style="background:var(--bl)"></span>Back-Left</div>
    <div class="m-val c-bl" id="v2">–</div><div class="m-unit">g</div></div>
  <div class="metric"><div class="m-label"><span class="m-tag" style="background:var(--br)"></span>Back-Right</div>
    <div class="m-val c-br" id="v3">–</div><div class="m-unit">g</div></div>
</div>

<div class="total-row">
  <div>
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:2px">Total Force</div>
    <span class="total-main" id="v-total">–</span><span class="total-unit"> g</span>
  </div>
</div>

<!-- Stabilogram (live COP trail) -->
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <span class="card-title">Stabilogram</span>
    <span style="font-size:11px;color:var(--text3)">Trail: 5 s</span>
  </div>
  <canvas id="stabCanvas" width="1060" height="1060"></canvas>
</div>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────
const WS_PORT          = 80;
const SAMPLE_RATE_HZ   = 40;
const LPF_CUTOFF_HZ    = 5.0;
const METRICS_INTERVAL = 8;
const METRICS_WINDOW   = 800;
const WARMUP_MS        = 500;
const PLATE_W_MM       = 339.411;
const PLATE_H_MM       = 339.411;
const TRAIL_SECONDS    = 5;
const MIN_FORCE_G      = 100;   // freeze COP when below this

// 30-sec balance test
const TEST_DURATION          = 30.0;
const VEL_EXCELLENT_MM       = 10.0;
const VEL_POOR_MM            = 30.0;
const COMPLETION_BONUS_FLOOR = 60;
const DROPPED_MAX            = 55;
const TEST_DROP_FORCE_G      = 100;

const $ = id => document.getElementById(id);

// ── Signal processing ─────────────────────────────────────────────────────
class LowPassFilter {
  // 2nd-order Butterworth via bilinear transform, Direct Form II Transposed.
  constructor(cutoffHz = 5.0, sampleRate = 40) {
    const wc = Math.tan((Math.PI * cutoffHz) / sampleRate);
    const wc2 = wc * wc;
    const sqrt2 = Math.SQRT2;
    const k = 1.0 / (1.0 + sqrt2 * wc + wc2);
    this.b0 = wc2 * k;
    this.b1 = 2.0 * this.b0;
    this.b2 = this.b0;
    this.a1 = 2.0 * (wc2 - 1.0) * k;
    this.a2 = (1.0 - sqrt2 * wc + wc2) * k;
    this.z1 = 0; this.z2 = 0;
  }
  process(x) {
    const y = this.b0 * x + this.z1;
    this.z1 = this.b1 * x - this.a1 * y + this.z2;
    this.z2 = this.b2 * x - this.a2 * y;
    return y;
  }
  reset() { this.z1 = 0; this.z2 = 0; }
}

const CHI2_95_DF2 = 5.991;
function computeEllipseParams(xs, ys) {
  const n = xs.length;
  if (n < 3) return null;
  let mx = 0, my = 0;
  for (let i = 0; i < n; i++) { mx += xs[i]; my += ys[i]; }
  mx /= n; my /= n;
  let vx = 0, vy = 0, cxy = 0;
  for (let i = 0; i < n; i++) { const dx = xs[i]-mx, dy = ys[i]-my; vx += dx*dx; vy += dy*dy; cxy += dx*dy; }
  vx /= (n-1); vy /= (n-1); cxy /= (n-1);
  const tr = vx + vy, det = vx*vy - cxy*cxy;
  const disc = Math.sqrt(Math.max(0, tr*tr - 4*det));
  const lam1 = (tr + disc) / 2, lam2 = (tr - disc) / 2;
  return {
    centerX: mx, centerY: my,
    semiAxisA: Math.sqrt(Math.max(0, lam1) * CHI2_95_DF2),
    semiAxisB: Math.sqrt(Math.max(0, lam2) * CHI2_95_DF2),
    angle: 0.5 * Math.atan2(2*cxy, vx - vy) * (180/Math.PI),
  };
}

class Pipeline {
  constructor() {
    this.copXFilter = new LowPassFilter(LPF_CUTOFF_HZ, SAMPLE_RATE_HZ);
    this.copYFilter = new LowPassFilter(LPF_CUTOFF_HZ, SAMPLE_RATE_HZ);
    this.xs = []; this.ys = [];
    this.warmupSamples = Math.round(WARMUP_MS / (1000 / SAMPLE_RATE_HZ));
    this.warmupCount = 0;
    this.sinceMetrics = 0;
    this.lastValidCopX = 0; this.lastValidCopY = 0;
  }
  reset() {
    this.copXFilter.reset(); this.copYFilter.reset();
    this.xs = []; this.ys = [];
    this.warmupCount = 0; this.sinceMetrics = 0;
    this.lastValidCopX = 0; this.lastValidCopY = 0;
  }
  process(fl, fr, bl, br) {
    const fz = fl + fr + bl + br;
    let copX, copY;
    if (fz >= MIN_FORCE_G) {
      copX = ((fr + br) - (fl + bl)) / fz * (PLATE_W_MM / 2);
      copY = ((fl + fr) - (bl + br)) / fz * (PLATE_H_MM / 2);
      this.lastValidCopX = copX; this.lastValidCopY = copY;
    } else {
      copX = this.lastValidCopX; copY = this.lastValidCopY;
    }
    const copXF = this.copXFilter.process(copX);
    const copYF = this.copYFilter.process(copY);
    this.warmupCount++;
    let ellipse = null;
    if (this.warmupCount > this.warmupSamples) {
      this.xs.push(copXF); this.ys.push(copYF);
      if (this.xs.length > METRICS_WINDOW) { this.xs.shift(); this.ys.shift(); }
      this.sinceMetrics++;
      if (this.sinceMetrics >= METRICS_INTERVAL && this.xs.length >= 20) {
        this.sinceMetrics = 0;
        ellipse = computeEllipseParams(this.xs, this.ys);
      }
    }
    return { copXF, copYF, ellipse };
  }
}

// ── App state ─────────────────────────────────────────────────────────────
let ws = null;
let userDisconnect = false;
let connected = false;
let pipeline = new Pipeline();
let trailBuffer = [];
let lastCornerForces = [null, null, null, null];
let lastEllipse = null;
let sampleTimes = [];

// Balance test state
let testState      = 'ready';
let testStartT     = 0;
let testPathMm     = 0;
let testPrevCopX   = null;
let testPrevCopY   = null;
let testTimerRAF   = null;

const stabCanvas = $('stabCanvas');
const stabCtx    = stabCanvas.getContext('2d');
const cornerVals = [0,1,2,3].map(i => $('v' + i));

// ── Stabilogram rendering ─────────────────────────────────────────────────
let stabBg = null;
function getStabBg(W, H) {
  if (stabBg && stabBg.width === W && stabBg.height === H) return stabBg;
  stabBg = document.createElement('canvas');
  stabBg.width = W; stabBg.height = H;
  const ctx = stabBg.getContext('2d');
  const PAD = 38;
  const scaleX = (W / 2 - PAD) / (PLATE_W_MM / 2);
  const scaleY = (H / 2 - PAD) / (PLATE_H_MM / 2);
  const scaleR = Math.min(scaleX, scaleY);
  const rings = [50, 100, 150, 170];
  const alphas = [0.09, 0.12, 0.16, 0.22];
  ctx.font = '10px IBM Plex Mono, monospace';
  rings.forEach((mm, i) => {
    const r = mm * scaleR;
    ctx.beginPath(); ctx.arc(W/2, H/2, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,255,255,${alphas[i]})`;
    ctx.lineWidth = i === rings.length - 1 ? 1.5 : 1;
    ctx.setLineDash(i === rings.length - 1 ? [] : [3, 5]);
    ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = `rgba(255,255,255,${alphas[i] + 0.12})`;
    ctx.fillText(String(mm), W/2 + r + 4, H/2 + 4);
  });
  const tlx = W/2 + (-PLATE_W_MM/2) * scaleX;
  const tly = H/2 - ( PLATE_H_MM/2) * scaleY;
  const brx = W/2 + ( PLATE_W_MM/2) * scaleX;
  const bry = H/2 - (-PLATE_H_MM/2) * scaleY;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(tlx, tly, brx - tlx, bry - tly);
  ctx.strokeStyle = 'rgba(255,255,255,0.14)'; ctx.lineWidth = 1;
  ctx.setLineDash([4, 5]);
  ctx.beginPath(); ctx.moveTo(W/2, tly); ctx.lineTo(W/2, bry); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tlx, H/2); ctx.lineTo(brx, H/2); ctx.stroke();
  ctx.setLineDash([]);
  return stabBg;
}
function mmToCanvas(xMm, yMm, W, H, sx, sy) {
  return { cx: W/2 + xMm * sx, cy: H/2 - yMm * sy };
}
function drawStabilogram() {
  const W = stabCanvas.width, H = stabCanvas.height, PAD = 38;
  const sx = (W/2 - PAD) / (PLATE_W_MM / 2);
  const sy = (H/2 - PAD) / (PLATE_H_MM / 2);

  stabCtx.clearRect(0, 0, W, H);
  stabCtx.drawImage(getStabBg(W, H), 0, 0);

  const tlx = W/2 + (-PLATE_W_MM/2) * sx;
  const tly = H/2 - ( PLATE_H_MM/2) * sy;
  const brx = W/2 + ( PLATE_W_MM/2) * sx;
  const bry = H/2 - (-PLATE_H_MM/2) * sy;
  const corners = [
    { x: brx, y: tly, ax: -1, ay:  1, name: 'FL', color: '#60a5fa' },
    { x: tlx, y: tly, ax:  1, ay:  1, name: 'FR', color: '#4ade80' },
    { x: brx, y: bry, ax: -1, ay: -1, name: 'BL', color: '#fbbf24' },
    { x: tlx, y: bry, ax:  1, ay: -1, name: 'BR', color: '#f87171' },
  ];
  stabCtx.font = 'bold 11px IBM Plex Mono, monospace';
  corners.forEach((c, i) => {
    const v = lastCornerForces[i];
    const label = v != null ? `${c.name} ${Math.round(v)}g` : c.name;
    stabCtx.fillStyle = c.color;
    stabCtx.textAlign = c.ax > 0 ? 'left' : 'right';
    stabCtx.fillText(label, c.x + (c.ax > 0 ? 7 : -7), c.y + (c.ay > 0 ? 16 : -7));
  });
  stabCtx.textAlign = 'left';

  // 95% confidence ellipse
  if (lastEllipse) {
    const ex = W/2 + (-lastEllipse.centerX) * sx;
    const ey = H/2 - lastEllipse.centerY * sy;
    const aR = lastEllipse.semiAxisA * sx, bR = lastEllipse.semiAxisB * sy;
    const ang = lastEllipse.angle * Math.PI / 180;
    stabCtx.save();
    stabCtx.translate(ex, ey); stabCtx.rotate(ang);
    stabCtx.beginPath();
    stabCtx.ellipse(0, 0, Math.max(aR, 1), Math.max(bR, 1), 0, 0, Math.PI*2);
    stabCtx.fillStyle = 'rgba(251,191,36,0.12)';
    stabCtx.fill();
    stabCtx.strokeStyle = 'rgba(251,191,36,0.70)';
    stabCtx.lineWidth = 1.5;
    stabCtx.stroke();
    stabCtx.restore();
  }

  // COP trail — banded opacity gradient
  const N = trailBuffer.length;
  if (N > 1) {
    const BANDS = 8, bandSize = Math.ceil((N - 1) / BANDS);
    for (let b = 0; b < BANDS; b++) {
      const s = b * bandSize, e = Math.min(s + bandSize, N - 1);
      if (s >= e) break;
      const t = (s + e) / 2 / Math.max(N - 2, 1);
      stabCtx.beginPath();
      const p0 = mmToCanvas(trailBuffer[s].x, trailBuffer[s].y, W, H, sx, sy);
      stabCtx.moveTo(p0.cx, p0.cy);
      for (let i = s + 1; i <= e; i++) {
        const p = mmToCanvas(trailBuffer[i].x, trailBuffer[i].y, W, H, sx, sy);
        stabCtx.lineTo(p.cx, p.cy);
      }
      stabCtx.strokeStyle = `rgba(148,163,184,${(0.12 + 0.60 * t).toFixed(2)})`;
      stabCtx.lineWidth = 0.8 + 1.4 * t;
      stabCtx.stroke();
    }
  }

  // Current COP dot
  if (N > 0) {
    const last = trailBuffer[N - 1];
    const lp = mmToCanvas(last.x, last.y, W, H, sx, sy);
    stabCtx.beginPath(); stabCtx.arc(lp.cx, lp.cy, 9, 0, Math.PI*2);
    stabCtx.fillStyle = 'rgba(74,222,128,0.15)'; stabCtx.fill();
    stabCtx.beginPath(); stabCtx.arc(lp.cx, lp.cy, 5, 0, Math.PI*2);
    stabCtx.fillStyle = '#4ade80';
    stabCtx.shadowColor = '#4ade80'; stabCtx.shadowBlur = 12;
    stabCtx.fill(); stabCtx.shadowBlur = 0;
  }
}
let pendingRender = false;
function scheduleRender() {
  if (pendingRender) return;
  pendingRender = true;
  requestAnimationFrame(() => { pendingRender = false; drawStabilogram(); });
}
drawStabilogram();

// ── Frame handler ─────────────────────────────────────────────────────────
// Device posts: "[<ms>ms] FL:<g>g FR:<g>g BL:<g>g BR:<g>g TOTAL:<g>g"
// Since calibration is done, we trust every frame and parse grams.
const LINE_RE = /\[(\d+)ms\]\s+FL:(-?[\d.]+)g?\s+FR:(-?[\d.]+)g?\s+BL:(-?[\d.]+)g?\s+BR:(-?[\d.]+)g?/;

function handleFrame(deviceMs, fl, fr, bl, br) {
  const forces = [fl, fr, bl, br].map(v => Math.max(0, v));
  lastCornerForces = forces;
  forces.forEach((v, i) => { cornerVals[i].textContent = Math.round(v); });
  const total = forces[0] + forces[1] + forces[2] + forces[3];
  $('v-total').textContent = Math.round(total);

  const p = pipeline.process(forces[0], forces[1], forces[2], forces[3]);
  // Negate X: board is mounted with left/right flipped in the UI.
  const cx = Math.max(-PLATE_W_MM/2, Math.min(PLATE_W_MM/2, -p.copXF));
  const cy = Math.max(-PLATE_H_MM/2, Math.min(PLATE_H_MM/2,  p.copYF));
  trailBuffer.push({ x: cx, y: cy, t: deviceMs });
  const cutoff = deviceMs - TRAIL_SECONDS * 1000;
  while (trailBuffer.length && trailBuffer[0].t < cutoff) trailBuffer.shift();
  if (p.ellipse) lastEllipse = p.ellipse;

  testAccumulate(p.copXF, p.copYF, total);

  // Hz pill — trailing 2 s window
  const now = Date.now();
  sampleTimes.push(now);
  while (sampleTimes.length && now - sampleTimes[0] >= 2000) sampleTimes.shift();
  if (sampleTimes.length >= 2) {
    $('hz-val').textContent = (sampleTimes.length / 2).toFixed(0);
    $('hz-pill').style.display = '';
  }
  scheduleRender();
}

// ── Balance Test ──────────────────────────────────────────────────────────
function calcBalanceScore(timeHeldSec, meanVelocity) {
  if (timeHeldSec >= TEST_DURATION) {
    if (meanVelocity <= VEL_EXCELLENT_MM) return 100;
    if (meanVelocity >= VEL_POOR_MM)      return COMPLETION_BONUS_FLOOR;
    const pct = (VEL_POOR_MM - meanVelocity) / (VEL_POOR_MM - VEL_EXCELLENT_MM);
    return Math.round(COMPLETION_BONUS_FLOOR + pct * (100 - COMPLETION_BONUS_FLOOR));
  }
  return Math.round((timeHeldSec / TEST_DURATION) * DROPPED_MAX);
}

function colorClassForScore(s) {
  if (s >= 90) return 'scored-100';
  if (s >= 75) return 'scored-80';
  if (s >= 55) return 'scored-60';
  if (s >= 35) return 'scored-40';
  return 'scored-0';
}

function renderTestScore(score, subLabel) {
  const el = $('test-score');
  el.textContent = (score === null || score === undefined) ? '–' : String(score);
  el.className = 'test-score-val ' + (score === null ? '' : colorClassForScore(score));
  $('test-score-sub').textContent = subLabel;
}

function resetTest() {
  cancelAnimationFrame(testTimerRAF);
  testState = 'ready';
  testStartT = 0;
  testPathMm = 0;
  testPrevCopX = null;
  testPrevCopY = null;
  $('test-state').textContent = 'Ready';
  $('test-state').style.color = '';
  $('test-time').textContent = TEST_DURATION.toFixed(1) + ' s';
  $('test-held').textContent = '0.0 s';
  $('test-vel').textContent = '– mm/s';
  $('test-progress-fill').style.width = '0%';
  $('test-progress-fill').style.background = 'var(--green)';
  renderTestScore(null, 'out of 100');
  $('btn-test-start').disabled = !connected;
  $('btn-test-stop').disabled  = true;
}

function startBalanceTest() {
  if (!connected) return;
  if (testState === 'running') return;
  testState = 'running';
  testStartT = performance.now();
  testPathMm = 0;
  testPrevCopX = null;
  testPrevCopY = null;
  $('test-state').textContent = 'Running';
  $('test-state').style.color = 'var(--green)';
  $('btn-test-start').disabled = true;
  $('btn-test-stop').disabled  = false;
  testLoop();
}

function stopBalanceTest(reason) {
  if (testState !== 'running') return;
  cancelAnimationFrame(testTimerRAF);
  const elapsed = Math.min(TEST_DURATION, (performance.now() - testStartT) / 1000);
  const meanVel = elapsed > 0 ? (testPathMm / elapsed) : 0;
  const score = calcBalanceScore(elapsed, meanVel);
  testState = (reason === 'complete') ? 'complete' : 'dropped';
  $('test-state').textContent = (reason === 'complete') ? 'Completed ✓' : 'Stopped (fell off)';
  $('test-state').style.color = (reason === 'complete') ? 'var(--green)' : 'var(--red)';
  $('test-held').textContent = elapsed.toFixed(1) + ' s';
  $('test-vel').textContent  = meanVel.toFixed(2) + ' mm/s';
  $('test-time').textContent = (TEST_DURATION - elapsed).toFixed(1) + ' s';
  $('test-progress-fill').style.width = ((elapsed / TEST_DURATION) * 100).toFixed(1) + '%';
  $('test-progress-fill').style.background = (reason === 'complete') ? 'var(--green)' : 'var(--red)';
  renderTestScore(score, reason === 'complete' ? 'completed · ' + meanVel.toFixed(2) + ' mm/s' : 'dropped at ' + elapsed.toFixed(1) + ' s');
  $('btn-test-start').disabled = !connected;
  $('btn-test-stop').disabled  = true;
}

function testLoop() {
  if (testState !== 'running') return;
  const elapsed = (performance.now() - testStartT) / 1000;
  if (elapsed >= TEST_DURATION) { stopBalanceTest('complete'); return; }
  const remaining = TEST_DURATION - elapsed;
  const meanVel = elapsed > 0 ? (testPathMm / elapsed) : 0;
  const liveScore = calcBalanceScore(elapsed, meanVel);
  $('test-time').textContent = remaining.toFixed(1) + ' s';
  $('test-held').textContent = elapsed.toFixed(1) + ' s';
  $('test-vel').textContent  = meanVel.toFixed(2) + ' mm/s';
  $('test-progress-fill').style.width = ((elapsed / TEST_DURATION) * 100).toFixed(1) + '%';
  renderTestScore(liveScore, 'live · ' + elapsed.toFixed(1) + 's');
  testTimerRAF = requestAnimationFrame(testLoop);
}

function testAccumulate(copXF, copYF, totalG) {
  if (testState !== 'running') return;
  if (totalG < TEST_DROP_FORCE_G) { stopBalanceTest('dropped'); return; }
  if (testPrevCopX !== null) {
    const dx = copXF - testPrevCopX, dy = copYF - testPrevCopY;
    testPathMm += Math.sqrt(dx * dx + dy * dy);
  }
  testPrevCopX = copXF;
  testPrevCopY = copYF;
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connect() {
  if (ws && ws.readyState <= WebSocket.OPEN) return;
  const host = $('host-input').value.trim();
  if (!host) return;
  const url = `ws://${host}:${WS_PORT}`;
  $('btn-connect').disabled = true;
  userDisconnect = false;
  ws = new WebSocket(url);

  ws.onopen = () => {
    connected = true;
    setStatus('connected');
    // Tell device to stream if it isn't already.
    ws.send('start');
  };
  ws.onclose = () => {
    connected = false;
    ws = null;
    setStatus('disconnected');
    if (!userDisconnect) setTimeout(() => { if (!connected) connect(); }, 3000);
  };
  ws.onerror = () => {};
  ws.onmessage = (ev) => {
    const line = ev.data.trim();
    if (!line) return;
    // Ignore [STATUS] / [INFO] / [CAL...] — we only care about posting lines.
    if (line.startsWith('[STATUS]') || line.startsWith('[INFO]') || line.startsWith('[CAL')) return;
    const m = line.match(LINE_RE);
    if (!m) return;
    handleFrame(
      parseInt(m[1], 10),
      parseFloat(m[2]), parseFloat(m[3]),
      parseFloat(m[4]), parseFloat(m[5])
    );
  };
}

function disconnect() {
  userDisconnect = true;
  if (ws) ws.close();
}

function tare() {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send('t');
}

// ── UI helpers ────────────────────────────────────────────────────────────
function setStatus(state) {
  const dot = $('status-dot'), txt = $('status-text');
  dot.className = 'dot';
  if (state === 'connected') {
    dot.classList.add('on'); txt.textContent = 'Connected';
    $('btn-connect').disabled = true;
    $('btn-disconnect').disabled = false;
    $('btn-tare').disabled = false;
    if (testState !== 'running') $('btn-test-start').disabled = false;
  } else {
    txt.textContent = 'Disconnected';
    $('btn-connect').disabled = false;
    $('btn-disconnect').disabled = true;
    $('btn-tare').disabled = true;
    $('hz-pill').style.display = 'none';
    sampleTimes.length = 0;
    cornerVals.forEach(el => el.textContent = '–');
    $('v-total').textContent = '–';
    if (testState === 'running') stopBalanceTest('dropped');
    $('btn-test-start').disabled = true;
    $('btn-test-stop').disabled  = true;
  }
}

// ── Event wiring ──────────────────────────────────────────────────────────
$('btn-connect').addEventListener('click', connect);
$('btn-disconnect').addEventListener('click', disconnect);
$('btn-tare').addEventListener('click', tare);
$('host-input').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
$('btn-test-start').addEventListener('click', startBalanceTest);
$('btn-test-stop').addEventListener('click', () => stopBalanceTest('dropped'));
$('btn-test-reset').addEventListener('click', resetTest);

// Initial UI state
setStatus('disconnected');
resetTest();
</script>
</body>
</html>
